name: Bot Scheduled Tasks

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 22 * * 0"
  workflow_dispatch:

jobs:
  check-news:
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Call news checker
        run: |
          curl -sS "${{ secrets.RENDER_BASE_URL }}/check-news"

  weekly-report:
    if: github.event.schedule == '0 22 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly report
        run: |
          curl -sS "${{ secrets.RENDER_BASE_URL }}/weekly-report/send"
